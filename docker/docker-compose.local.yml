services:
  postgres:
    image: postgres:16-alpine
    container_name: raqmi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raqmi_system
      POSTGRES_USER: raqmi
      POSTGRES_PASSWORD: raqmi_password
    ports:
      - "5432:5432"
    volumes:
      - raqmi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raqmi -d raqmi_system"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: raqmi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raqmi
      MINIO_ROOT_PASSWORD: raqmi_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - raqmi_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: raqmi-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 raqmi raqmi_password; do sleep 2; done;
      mc mb local/raqmi-system --ignore-existing;
      mc anonymous set download local/raqmi-system;
      exit 0;
      "

volumes:
  raqmi_postgres_data:
  raqmi_minio_data:
