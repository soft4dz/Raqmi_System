services:
  postgres:
    image: postgres:16-alpine
    container_name: raqmi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: raqmi_system
      POSTGRES_USER: raqmi
      POSTGRES_PASSWORD: raqmi_password
    ports:
      - "5432:5432"
    volumes:
      - raqmi_postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: raqmi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raqmi
      MINIO_ROOT_PASSWORD: raqmi_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - raqmi_minio_data:/data

volumes:
  raqmi_postgres_data:
  raqmi_minio_data:
